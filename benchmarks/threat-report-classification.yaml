task:
  name: threat-report-classification
  description: Classify intelligence reports by threat category and severity
  version: "1.0"

categories:
  - cyber-intrusion
  - terrorism
  - state-sponsored
  - criminal
  - insider-threat

severity_levels:
  - critical
  - high
  - medium
  - low
  - informational

metrics:
  primary: f1-weighted
  secondary:
    - precision
    - recall
    - accuracy

evaluation:
  n_samples: 500
  cross_validation: 5-fold
  stratified: true
